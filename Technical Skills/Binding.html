<!DOCTYPE html>
<html>
	<head>
		<title>Simple Binding</title>
	</head>
	<body>
		<!-- Step 1 and 2 -->
		<h1 id = "action">CLICK ME</h1>
		<p id = "info"></p>
		<script>
			var countries = ["Canada","Mexico","USA","Bahamas","Nicaragua","Guatemala","Honduras","El Salvador","Belize","Costa Rica","Jamaica","Haiti","Dominica","Dominican Republic","Cuba","Panama","St.Lucia","St.Vincent and the Grenadines", "Grenada","St Kitts and Nevis", "Antigua and Barbuda", "Barbados", "Trinidad and Tobago"];
			var index = 0;
			obj = document.getElementById("action"); //step 3
			obj.onclick = fnc; //Step 5 
			//Step 4
			function fnc() {
				console.log("BOUND!!");
				var paragraph = document.getElementById("info");
				var text = document.createTextNode(countries[index%countries.length]+", ");
				paragraph.appendChild(text);
				index = index + 1;
			}
		</script>
	</body>
</html>
